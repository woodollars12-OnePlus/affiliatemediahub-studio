async function askBecky(system,messages){
  const GOOGLE_API_KEY=localStorage.getItem("hub_api_key")||"";
  if(!GOOGLE_API_KEY)return"⚠️ No API key found. Please refresh and enter your Google AI Studio key.";
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${GOOGLE_API_KEY}`;
  const allMessages=[];
  if(system)allMessages.push({role:"user",parts:[{text:"SYSTEM: "+system}]},{role:"model",parts:[{text:"Understood! I will follow these instructions."}]});
  messages.forEach(m=>allMessages.push({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]}));
  const r=await fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:allMessages,generationConfig:{maxOutputTokens:1000,temperature:0.9}})
  });
  const d=await r.json();
  if(d.error)return"⚠️ API Error: "+d.error.message;
  return d.candidates?.[0]?.content?.parts?.[0]?.text||"No response.";

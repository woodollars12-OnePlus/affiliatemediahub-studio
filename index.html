async function askBecky(system,messages){
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
  const geminiMessages=messages.map(m=>({
    role:m.role==="assistant"?"model":"user",
    parts:[{text:m.content}]
  }));
  const r=await fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      system_instruction:{parts:[{text:system}]},
      contents:geminiMessages,
      generationConfig:{maxOutputTokens:1000,temperature:0.9}
    })
  });
  const d=await r.json();
  if(d.error)return"⚠️ API Error: "+d.error.message;
  return d.candidates?.[0]?.content?.parts?.[0]?.text||"No response.";
}

function ChatPanel({agent,onClose}){
  const[msgs,setMsgs]=useState([{role:"assistant",content:`Hi! I'm **${agent.name}** — ${agent.desc}. Ready to help! 💜`}]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const[listening,setListening]=useState(false);
  const endRef=useRef(null);
  const recRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[msgs,loading]);

  const send=async(text=input)=>{
    if(!text.trim()||loading)return;
    const um={role:"user",content:text};
    setMsgs(m=>[...m,um]);setInput("");setLoading(true);
    const history=[...msgs,um].map(m=>({role:m.role,content:m.content}));
    const reply=await askBecky(agent.system,history);
    setMsgs(m=>[...m,{role:"assistant",content:reply}]);
    setLoading(false);
  };

  const toggleVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Voice not supported in this browser.");return;}
    if(listening){recRef.current?.stop();setListening(false);return;}
    const r=new SR();r.lang="en-US";r.continuous=false;
    r.onresult=e=>{setInput(e.results[0][0].transcript);setListening(false);};
    r.onerror=()=>setListening(false);r.onend=()=>setListening(false);
    recRef.current=r;r.start();setListening(true);
  };

  const md=t=>t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>");

  return React.createElement("div",{
    style:{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,0.92)",backdropFilter:"blur(16px)",display:"flex",alignItems:"center",justifyContent:"center",padding:12},
    onClick:e=>e.target===e.currentTarget&&onClose()
  },
    React.createElement("div",{style:{width:"100%",maxWidth:480,height:"88vh",background:"#0a0a14",border:`1px solid ${agent.color}40`,borderRadius:22,display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:`0 0 80px ${agent.color}20`}},
      // Header
      React.createElement("div",{style:{padding:"14px 18px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${agent.color}20`,background:`linear-gradient(135deg,${agent.color}18,transparent)`}},
        React.createElement("div",{style:{width:44,height:44,borderRadius:14,fontSize:22,background:`${agent.color}22`,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${agent.color}30`}},agent.icon),
        React.createElement("div",{style:{flex:1}},
          React.createElement("div",{style:{color:"#fff",fontWeight:700,fontSize:15}},agent.name),
          React.createElement("div",{style:{color:agent.color,fontSize:11,opacity:0.7}},agent.desc)
        ),
        React.createElement("button",{onClick:onClose,style:{background:"none",border:"none",color:"#555",fontSize:26,cursor:"pointer",lineHeight:1}},"×")
      ),
      // Messages

        ["AI","API","LIVE"].map(l=>React.createElement("div",{key:l,style:{display:"flex",alignItems:"center",gap:3}},
          React.createElement("div",{style:{width:4,height:4,borderRadius:"50%",background:"#22c55e"}}),
          React.createElement("span",{style:{color:"rgba(255,255,255,0.3)",fontSize:9,fontFamily:"monospace"}},l)
        ))
      )
    ),
    // Page
    React.createElement("div",{style:{flex:1,overflowY:"auto",overflowX:"hidden"}},
      page==="home"&&React.createElement(HomePage,{onOpenBecky:()=>setBecky(true)}),
      page==="characters"&&React.createElement(CatPage,{data:CHARACTERS,accentColor:"#a855f7",title:"Characters"}),
      page==="creation"&&React.createElement(CatPage,{data:CREATION,accentColor:"#6366f1",title:"Creation"}),
      page==="history"&&React.createElement(HistoryPage,null)
    ),
    // Bottom nav
    React.createElement("div",{style:{display:"flex",borderTop:"1px solid rgba(255,255,255,0.07)",background:"rgba(8,8,18,0.97)",flexShrink:0}},
      NAV.map(n=>{
        const active=page===n.id;
        return React.createElement("button",{key:n.id,onClick:()=>setPage(n.id),style:{flex:1,padding:"12px 4px 10px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
          React.createElement("span",{style:{fontSize:20,filter:active?"none":"grayscale(0.6) opacity(0.5)"}},n.icon),
          React.createElement("span",{style:{fontSize:10,fontWeight:active?700:400,color:active?"#a855f7":"rgba(255,255,255,0.3)"}},n.label),
          active&&React.createElement("div",{style:{width:20,height:2,borderRadius:1,background:"linear-gradient(90deg,#a855f7,#7c3aed)",marginTop:-2}})
        );
      })
    ),
    becky&&React.createElement(BeckyChatbot,{onClose:()=>setBecky(false)})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>

const{useState,useEffect,useRef}=React;
const PASS="JohnHub2025";

function getProfile(){
  return localStorage.getItem("hub_profile")||`Name: John Lanter | Location: Orange TX | Age: 59
CEO of The Hub Engine — built with Becky (Google Gemini) and Claude (Anthropic)
Background: 20+ years Lead Production Operator, Lion Elastomers (closed Dec 2025)
Heart attack Dec 4 2016, quadruple bypass. Coma at 18. Caring for 87yr sister-in-law daily.
Wife helps with caregiving. Former 9-state sales rep.
Shows: Lisa(Fri) Alisha(Wed) Susan(Mon) Paul Baby Boss(Thu)
Goals: Office job Southeast Texas + affiliate marketing income
Tone: Casual, warm, short actionable responses.`;
}

async function callClaude(system,history){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:history})
  });
  const d=await r.json();
  return d.content?.map(c=>c.text||"").join("")||"Sorry, try again!";
}

// ── REUSABLE CHAT WITH FILE UPLOAD ────────────────────────
function SmartChat({system,welcome,color="#f5c518"}){
  const[msgs,setMsgs]=useState([{role:"assistant",content:welcome}]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const[fileText,setFileText]=useState("");
  const[fileName,setFileName]=useState("");
  const[muted,setMuted]=useState(false);
  const endRef=useRef(null);
  const fileRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);

  const speak=t=>{
    if(muted||!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t.replace(/[#*_`]/g,""));
    const v=window.speechSynthesis.getVoices();
    const pick=v.find(x=>/samantha|karen|moira/i.test(x.name))||v.find(x=>x.lang==="en-US")||v[0];
    if(pick)u.voice=pick;u.rate=0.88;
    window.speechSynthesis.speak(u);
  };

  const readFile=f=>new Promise(res=>{
    if(!f)return res("");
    const r=new FileReader();
    if(f.type==="application/pdf"||f.name.endsWith(".pdf")){r.onload=e=>res("[PDF uploaded: "+f.name+"]");r.readAsDataURL(f);}
    else{r.onload=e=>res(e.target.result);r.readAsText(f);}
  });

  const handleFile=async e=>{
    const f=e.target.files[0];if(!f)return;
    setFileName(f.name);
    const txt=await readFile(f);
    setFileText(txt);
  };

  const send=async(text=input)=>{
    if((!text.trim()&&!fileText)||loading)return;
    let content=text.trim();
    if(fileText)content+="\n\n[Attached file: "+fileName+"]\n"+fileText.slice(0,3000);
    const um={role:"user",content};
    setMsgs(m=>[...m,um]);setInput("");setLoading(true);
    const profile=getProfile();
    const fullSystem=system+"\n\nUSER CONTEXT:\n"+profile;
    const history=[...msgs,um].slice(-10).map(m=>({role:m.role,content:m.content}));
    const reply=await callClaude(fullSystem,history);
    setMsgs(m=>[...m,{role:"assistant",content:reply}]);
    setLoading(false);speak(reply);
    setFileText("");setFileName("");
  };

  const onKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};
  const md=t=>t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>");

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",height:"100%"}},
    // Messages
    React.createElement("div",{style:{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}},
      msgs.map((m,i)=>React.createElement("div",{key:i,className:"anim",style:{
        alignSelf:m.role==="user"?"flex-end":"flex-start",
        maxWidth:"85%",padding:"10px 14px",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",
        background:m.role==="user"?`linear-gradient(135deg,${color}22,${color}44)`:"rgba(255,255,255,0.05)",
        border:m.role==="user"?`1px solid ${color}44`:"1px solid rgba(255,255,255,0.08)",
        fontSize:13,lineHeight:1.6,color:"#eeeef5"
      }},React.createElement("span",{dangerouslySetInnerHTML:{__html:md(m.content)}}))),
      loading&&React.createElement("div",{className:"dot",style:{alignSelf:"flex-start",padding:"10px 16px",background:"rgba(255,255,255,0.05)",borderRadius:18,fontSize:20}},
        React.createElement("span",null,"●")," ",React.createElement("span",null,"●")," ",React.createElement("span",null,"●")),
      React.createElement("div",{ref:endRef})
    ),
    // File indicator
    fileName&&React.createElement("div",{style:{margin:"0 14px 6px",padding:"6px 12px",background:`${color}18`,border:`1px solid ${color}33`,borderRadius:8,fontSize:11,color:color}},
      "📎 "+fileName+" — ready to send",
      React.createElement("button",{onClick:()=>{setFileText("");setFileName("");},style:{background:"none",border:"none",color:"rgba(255,255,255,0.4)",cursor:"pointer",marginLeft:8,fontSize:11}},"✕")
    ),
    // Input bar
    React.createElement("div",{style:{padding:"10px 14px",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",gap:8,alignItems:"flex-end"}},
      React.createElement("button",{onClick:()=>fileRef.current?.click(),style:{background:`${color}18`,border:`1px solid ${color}33`,borderRadius:10,padding:"10px",color:color,cursor:"pointer",fontSize:16,flexShrink:0}},"📎"),
      React.createElement("input",{ref:fileRef,type:"file",accept:".txt,.pdf,.doc,.docx,.md,.csv",onChange:handleFile,style:{display:"none"}}),
      React.createElement("textarea",{
        value:input,onChange:e=>setInput(e.target.value),onKeyDown:onKey,
        placeholder:"Type your message... (Enter to send)",
        rows:1,style:{
          flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",
          borderRadius:12,padding:"10px 14px",color:"#eeeef5",fontSize:13,resize:"none",
          outline:"none",lineHeight:1.5
        }
      }),
      React.createElement("button",{onClick:()=>setMuted(m=>!m),style:{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px",color:muted?"rgba(255,255,255,0.3)":"#f5c518",cursor:"pointer",fontSize:16,flexShrink:0}},muted?"🔇":"🔊"),
      React.createElement("button",{onClick:()=>send(),disabled:loading,style:{background:`linear-gradient(135deg,${color},${color}aa)`,border:"none",borderRadius:10,padding:"10px 16px",color:"#000",cursor:"pointer",fontSize:16,fontWeight:700,flexShrink:0,opacity:loading?0.5:1}},"➤")
    )
  );
}

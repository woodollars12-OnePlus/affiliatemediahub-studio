function getProfile(){
  try{
    const p = localStorage.getItem("hub_profile_v2");
    return p||"Name: John Lanter, Orange TX. Former Lead Production Operator. Building AI business.";
  }catch(e){return "John Lanter, Orange TX";}
}

async function callClaude(system, messages){
  let apiKey = "";
  try{ apiKey = localStorage.getItem("groq_key")||""; }catch(e){}
  if(!apiKey) return "⚠️ No API key found! Please go to the ⚙️ Settings tab, paste your Groq API key and tap Save!";
  try{
    const groqMessages = [
      {role:"system", content:system},
      ...messages.map(m=>({role:m.role, content:m.content}))
    ];
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization": "Bearer " + apiKey
      },
      body:JSON.stringify({
        model:"llama-3.3-70b-versatile",
        max_tokens:1000,
        messages:groqMessages
      })
    });
    const data = await res.json();
    if(data.choices && data.choices[0]) return data.choices[0].message.content;
    if(data.error) return "❌ " + data.error.message;
    return "Unexpected: " + JSON.stringify(data).slice(0,200);
  }catch(e){
    return "❌ Connection error: " + e.message;
  }
}

function speak(text, muted){
  if(muted || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/[#*_`]/g,""));
  
  const setVoice = () => {
    const voices = window.speechSynthesis.getVoices();
    // Priority: female English voices
    const pick = 
      voices.find(v=>/samantha/i.test(v.name)) ||
      voices.find(v=>/karen/i.test(v.name)) ||
      voices.find(v=>/moira/i.test(v.name)) ||
      voices.find(v=>/victoria/i.test(v.name)) ||
      voices.find(v=>/zira/i.test(v.name)) ||
      voices.find(v=>/susan/i.test(v.name)) ||
      voices.find(v=>/lisa/i.test(v.name)) ||
      voices.find(v=>/female/i.test(v.name)) ||
      voices.find(v=>v.lang==="en-US" && v.name.includes("Female")) ||
      voices.find(v=>v.lang==="en-GB") ||
      voices.find(v=>v.lang==="en-US") ||
      voices[0];
    if(pick) u.voice = pick;
    u.rate = 0.85;
    u.pitch = 1.2;
    window.speechSynthesis.speak(u);
  };

  // Voices may not be loaded yet
  if(window.speechSynthesis.getVoices().length > 0){
    setVoice();
  } else {
    window.speechSynthesis.onvoiceschanged = setVoice;
  }
}

// ─── SMART CHAT ───────────────────────────────────────────────
function SmartChat({system, welcome, color}){
  color = color||"#f5c518";
  const [msgs, setMsgs] = useState([{role:"assistant",content:welcome}]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [muted, setMuted] = useState(false);
  const [fileName, setFileName] = useState("");
  const [fileText, setFileText] = useState("");
  const endRef = useRef(null);
  const fileRef = useRef(null);

  useEffect(()=>{endRef.current && endRef.current.scrollIntoView({behavior:"smooth"});},[msgs,loading]);

  const handleFile = e => {
    const f = e.target.files[0];
    if(!f) return;
    setFileName(f.name);
    const r = new FileReader();
    if(f.name.endsWith(".pdf")){
      setFileText("[PDF: "+f.name+"]");
    } else {
      r.onload = ev => setFileText(ev.target.result||"");
      r.readAsText(f);
    }
  };

  const send = async () => {
    if((!input.trim() && !fileText) || loading) return;
    let content = input.trim();
    if(fileText) content += "\n\n[File attached: "+fileName+"]\n"+fileText.slice(0,3000);
    const userMsg = {role:"user",content};
    const newMsgs = [...msgs, userMsg];
    setMsgs(newMsgs);
    setInput("");
    setFileText("");
    setFileName("");
    setLoading(true);
    const profile = getProfile();
    const fullSystem = system + "\n\nUSER CONTEXT: " + profile;
    const history = newMsgs.slice(-10).map(m=>({role:m.role,content:m.content}));
    const reply = await callClaude(fullSystem, history);
    setMsgs(m=>[...m,{role:"assistant",content:reply}]);
    setLoading(false);
    speak(reply, muted);
  };

  const onKey = e => {
    if(e.key==="Enter" && !e.shiftKey){e.preventDefault();send();}
  };

  const S = {
    wrap:{display:"flex",flexDirection:"column",height:"100%"},
    msgs:{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:10},
    ai:{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",
      borderRadius:"16px 16px 16px 4px",padding:"10px 14px",fontSize:13,lineHeight:1.55,
      maxWidth:"88%",color:"#eeeef5"},
    user:{background:"rgba(245,197,24,0.12)",border:"1px solid rgba(245,197,24,0.25)",
      borderRadius:"16px 16px 4px 16px",padding:"10px 14px",fontSize:13,lineHeight:1.55,
      maxWidth:"80%",alignSelf:"flex-end",color:"#eeeef5"},
    bar:{padding:"8px 12px",borderTop:"1px solid rgba(255,255,255,0.07)",
      display:"flex",gap:8,alignItems:"center",background:"#08080e"},
    input:{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",
      borderRadius:12,padding:"10px 14px",fontSize:13,color:"#eeeef5",resize:"none"},
    btn:{background:"rgba(245,197,24,0.15)",border:"1px solid rgba(245,197,24,0.3)",
      borderRadius:10,padding:"10px 12px",fontSize:16,color:"#f5c518"},
    send:{background:"linear-gradient(135deg,#f5c518,#e8a020)",border:"none",
      borderRadius:10,padding:"10px 14px",fontSize:16,color:"#000",fontWeight:700}
  };

  return React.createElement("div",{style:S.wrap},
    React.createElement("div",{style:S.msgs},
      msgs.map((m,i)=>
        React.createElement("div",{key:i,className:"fadein",style:m.role==="user"?S.user:S.ai},
          React.createElement("span",{dangerouslySetInnerHTML:{__html:m.content.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>")}})
        )
      ),
      loading && React.createElement("div",{style:{...S.ai,color:"rgba(245,197,24,0.7)"},className:"fadein"},"✨ Thinking..."),
      fileName && React.createElement("div",{style:{fontSize:11,color:"rgba(245,197,24,0.7)",padding:"4px 14px"}},"📎 "+fileName),
      React.createElement("div",{ref:endRef})
    ),
    React.createElement("div",{style:S.bar},
      React.createElement("input",{type:"file",ref:fileRef,style:{display:"none"},onChange:handleFile}),
      React.createElement("button",{style:S.btn,onClick:()=>fileRef.current&&fileRef.current.click()},"📎"),
      React.createElement("textarea",{style:S.input,rows:1,placeholder:"Type your message...",
        value:input,onChange:e=>setInput(e.target.value),onKeyDown:onKey}),
      React.createElement("button",{style:S.btn,onClick:()=>setMuted(!muted)},muted?"🔇":"🔊"),
      React.createElement("button",{style:S.send,onClick:send},"➤")
    )
  );
}

function App(){
